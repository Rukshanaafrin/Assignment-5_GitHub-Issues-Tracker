<!DOCTYPE html>
<html data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- <link rel="shortcut icon" href="assets/fav-icon.png" type="image/x-icon"> -->

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts family -->
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }

       
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen overflow-x-hidden px-4">

    <div class="bg-white shadow-xl rounded-xl p-10 w-full max-w-md mx-auto text-center">

        <!-- logo -->
        <div class="flex justify-center mb-4">
            <img src="assets/github-logo.png" class="w-16">
        </div>

        <h1 class="text-xl font-bold">
            GitHub Issues Tracker
        </h1>

        <p class="text-gray-500 text-sm mb-6">
            Sign in to manage your issues
        </p>

        <!-- username -->
        <div class="text-left mb-3">
            <label class="text-sm font-medium">
                Username
            </label>

            <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mt-1">

            <p class="text-xs text-blue-500 mt-1">
                Default: admin
            </p>
        </div>

        <!-- password -->
        <div class="text-left mb-5">
            <label class="text-sm font-medium">
                Password
            </label>

            <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mt-1">

            <p class="text-xs text-blue-500 mt-1">
                Default: admin123
            </p>
        </div>

        <!-- button -->
        <button onclick="login()" class="btn btn-primary w-full">
            Sign In
        </button>

        <!-- OR section -->

        <div class="flex items-center gap-3 my-5">

            <div class="flex-1 border-t"></div>

            <span class="text-gray-400 text-sm">OR</span>

            <div class="flex-1 border-t"></div>
        </div>

        <!-- demo credentials -->
        <h4 class="text-gray-400 text-sm mb-2">Demo Credentials:</h4>
        <div class="bg-gray-200 rounded-lg p-4 text-center">
            <p class="text-sm">
                <span class="font-semibold">Username:</span> admin
            </p>

            <p class="text-sm">
                <span class="font-semibold">Password:</span> admin123
            </p>
        </div>

    </div>

    <script src="script/script.js"></script>

</body>

</html>
